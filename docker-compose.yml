services:
  backend:
    build: ./backend
    container_name: sport-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DB_PATH=/data/sport.db
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT}
    volumes:
      - sport-data:/data
    networks:
      - sport-net
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: sport-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sport-net

volumes:
  sport-data:
    driver: local

networks:
  sport-net:
    driver: bridge
